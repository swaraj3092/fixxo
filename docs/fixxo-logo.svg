<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1030"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25d366"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tightGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="160" rx="18" fill="url(#bgGrad)"/>

  <!-- Subtle radial glow behind icon -->
  <radialGradient id="radGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.18"/>
    <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:0"/>
  </radialGradient>
  <ellipse cx="80" cy="80" rx="65" ry="65" fill="url(#radGlow)"/>

  <!-- === ICON: Wrench forming an X === -->
  <g transform="translate(80,80)" filter="url(#softGlow)">

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="url(#xGrad)" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="38" fill="#1e1040" opacity="0.85"/>

    <!-- Lightning bolt / fix symbol -->
    <polygon points="6,-22 -4,-2 4,-2 -6,22 8,4 -2,4" fill="url(#glowGrad)" filter="url(#tightGlow)" opacity="0.95"/>

    <!-- Two crossed wrench hints (subtle) -->
    <line x1="-26" y1="-26" x2="26" y2="26" stroke="url(#xGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.25"/>
    <line x1="26" y1="-26" x2="-26" y2="26" stroke="url(#xGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.25"/>

    <!-- Corner tick marks on ring -->
    <line x1="0" y1="-44" x2="0" y2="-38" stroke="#a855f7" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="44" x2="0" y2="38" stroke="#a855f7" stroke-width="2" opacity="0.7"/>
    <line x1="-44" y1="0" x2="-38" y2="0" stroke="#6366f1" stroke-width="2" opacity="0.7"/>
    <line x1="44" y1="0" x2="38" y2="0" stroke="#6366f1" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- === WORDMARK: FIXXO === -->
  <!-- F -->
  <text x="150" y="105" font-family="'Arial Black', 'Impact', sans-serif" font-size="62" font-weight="900" fill="url(#textGrad)" letter-spacing="-2">FIXXO</text>

  <!-- Purple X highlight overlay on the XX -->
  <text x="150" y="105" font-family="'Arial Black', 'Impact', sans-serif" font-size="62" font-weight="900" fill="none" letter-spacing="-2"
        stroke="url(#xGrad)" stroke-width="0">FIXXO</text>

  <!-- Highlight just the XX in purple -->
  <text x="224" y="105" font-family="'Arial Black', 'Impact', sans-serif" font-size="62" font-weight="900" fill="url(#xGrad)" letter-spacing="-2" filter="url(#tightGlow)">XX</text>

  <!-- Tagline -->
  <text x="152" y="124" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#64748b" letter-spacing="3.5">FIX IT. FAST. OPEN.</text>

  <!-- Accent underline -->
  <rect x="152" y="130" width="280" height="2" rx="1" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Floating dots top right -->
  <circle cx="488" cy="28" r="3.5" fill="#a855f7" opacity="0.5" filter="url(#tightGlow)"/>
  <circle cx="504" cy="40" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="496" cy="52" r="2.5" fill="#25d366" opacity="0.35"/>
  <circle cx="482" cy="48" r="1.5" fill="#0ea5e9" opacity="0.4"/>

  <!-- Bottom right version badge -->
  <rect x="450" y="128" width="52" height="20" rx="10" fill="#a855f7" opacity="0.12"/>
  <text x="476" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#c084fc" text-anchor="middle">v 1.0</text>
</svg>
